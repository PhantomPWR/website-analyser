services:
  frontend:
    build: .
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      HOST: 0.0.0.0
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: http://localhost:8007
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8007:8000"
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_PATH: /data/reports.db
    volumes:
      - reports_data:/data
    restart: unless-stopped

volumes:
  reports_data:
