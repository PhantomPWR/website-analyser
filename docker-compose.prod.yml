services:
  frontend:
    image: pieterkdevilliers/website-analyser-frontend:latest
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      HOST: 0.0.0.0
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE: https://ee-website-analyser.expertecho.ai
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: pieterkdevilliers/website-analyser-backend:latest
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: "1"
      DB_PATH: /data/reports.db
    volumes:
      - reports_data:/data
    restart: unless-stopped

volumes:
  reports_data:
